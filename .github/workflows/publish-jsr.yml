name: Publish to JSR

on:
  push: { tags: ["v*"] }
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # JSR OIDC auth

jobs:
  publish:
    name: Publish @kjanat/tree-sitter-recipe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx jsr build
      - run: bunx jsr publish --provenance
