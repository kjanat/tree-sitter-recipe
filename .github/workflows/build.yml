name: Build
on: { workflow_call: { outputs: { artifact: { value: build } } }, workflow_dispatch: null }
permissions: { contents: read }
jobs:
  prebuild:
    name: Prebuild ${{ matrix.os }}
    strategy: { fail-fast: false, matrix: { os: [ubuntu-latest, macos-latest, windows-latest] } }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with: { node-version-file: .node-version }
      - run: npm install -g node-gyp
      - run: bun install --frozen-lockfile
      - run: bunx prebuildify --napi
      - uses: actions/upload-artifact@v7
        with: { name: "prebuilds-${{ matrix.os }}", path: prebuilds/, if-no-files-found: error }
  bundle:
    name: Bundle dist + wasm
    needs: prebuild
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with: { node-version-file: .node-version }
      - run: npm install -g node-gyp
      - uses: tree-sitter/setup-action@v2
        with: { install-lib: false }
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v8
        with: { pattern: prebuilds-*, path: prebuilds/, merge-multiple: true }
      - run: bun run build
      - run: tree-sitter build --wasm
      - uses: actions/upload-artifact@v7
        with: { name: build, path: "dist/\nprebuilds/\ntree-sitter-recipe.wasm", if-no-files-found: error }
